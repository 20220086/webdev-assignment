<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈페이지</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: url('assignment background.png') no-repeat center center fixed;
            background-size: cover;
            color: #e8f8fc;
        }
        .container { /*content 테두리*/
            display: flex;
            width: 800px;
            margin: 50px auto;
            border: 1px solid #AACDDC;
            background-color: #AACDDC;
        }
        .menu { /*m*/
            width: 30%;
            background-color: #fcf6e8;
            padding: 10px;
        }
        .menu iframe {
            width: 100%;
            height: 300px;
            border: none;
        }
        .content {
            width: 70%;
            padding: 10px;
        }
        .header {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            background-color: #81A6C6;
            color: black;
        }
        .content iframe {
            width: 100%;
            height: 300px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu">
            <div class="header">메뉴</div>
            <iframe src="menu.html"></iframe>
        </div>
        <div class="content">
            <div class="header">인공지능공학전공 길상준의 홈페이지</div>
            <iframe src="content.html"></iframe>
        </div>
    </div>
</body>
</html>
