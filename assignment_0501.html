<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>이미지 페이징</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <h2>나의 앨범</h2>
        <!-- 라디오 버튼 -->
        <input type="radio" name="page" id="page1" checked>
        <input type="radio" name="page" id="page2">
        <input type="radio" name="page" id="page3">
        <div class="album glass">
            <div class="page p1">
                <img src="images/1.jpg" alt="사진1" class="photo">
                <img src="images/2.jpg" alt="사진2" class="photo">
                <img src="images/3.jpg" alt="사진3" class="photo">
            </div>
            <div class="page p2">
                <img src="images/4.jpg" alt="사진4" class="photo">
                <img src="images/5.jpg" alt="사진5" class="photo">
                <img src="images/6.jpg" alt="사진6" class="photo">
            </div>
            <div class="page p3">
                <img src="images/7.jpg" alt="사진7" class="photo">
                <img src="images/8.jpg" alt="사진8" class="photo">
                <img src="images/9.jpg" alt="사진9" class="photo">
            </div>
        </div>
        <!-- 버튼 -->
        <br>
        <div class="center">
            <!-- for="page1"은 라디오 버튼의 아이디 선택자 "page1"과 연결됨 -->
            <label class="glass hover" for="page1">1</label>
            <label class="glass hover" for="page2">2</label> 
            <label class="glass hover" for="page3">3</label>
        </div>
    </body>
</html>
